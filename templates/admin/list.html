{{define "admin_list.html"}}
{{template "base" .}}
{{end}}
{{define "content"}}
<h1>Admin - Image Management</h1>
<a href="/admin/new" class="btn btn-success mb-3">Add New Image</a>
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Camera</th>
            <th>Scope</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {{range .}}
        <tr id="row-{{.ID}}">
            <td>{{.ID}}</td>
            <td>{{.Name}}</td>
            <td>{{.Type}}</td>
            <td>{{.Camera}}</td>
            <td>{{.Scope}}</td>
            <td>{{.Date}}</td>
            <td>
                <a href="/admin/edit?id={{.ID}}" class="btn btn-sm btn-primary">Edit</a>
                <button class="btn btn-sm btn-danger"
                    hx-post="/admin/delete"
                    hx-vals="{&quot;id&quot;: &quot;{{.ID}}&quot;}"
                    hx-target="#row-{{.ID}}"
                    hx-swap="outerHTML"
                    hx-confirm="Delete image {{.ID}}?">Delete</button>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{end}}
